<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant Registration - MediCare Clinic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>

<body>

    <div class="wrapper">
        <!-- Unified Sidebar (Synced) -->
        <div class="sidebar">
            <div
                class="sidebar-brand d-flex align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-25">
                <div class="clinic-logo-box me-2"><i class="fa-solid fa-heart-pulse"></i></div>
                <div>
                    <h5 class="mb-0 text-white fw-bold">MediCare Clinic</h5><small
                        class="text-white-50 opacity-75">Admin Panel</small>
                </div>
            </div>
            <a href="../index.html" class="sidebar-link"><i class="fa-solid fa-desktop"></i> HOME</a>
            <a href="login.html" class="sidebar-link"><i class="fa-solid fa-right-to-bracket"></i> LOG IN</a>
            <div class="nav-title">ADMIN MENU</div>
            <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-pie"></i> Admin Dashboard</a>
            <a href="staff.html" class="sidebar-link active"><i class="fa-solid fa-user-doctor"></i> Staff
                Management</a>
            <a href="serv&spec.html" class="sidebar-link"><i class="fa-solid fa-hand-holding-medical"></i> Services &
                Specialties</a>
            <a href="patient.html" class="sidebar-link"><i class="fa-solid fa-hospital-user"></i> Patients & Visits</a>
            <a href="financ.html" class="sidebar-link"><i class="fa-solid fa-money-bill-trend-up"></i> Financial
                Management</a>
            <a href="system.html" class="sidebar-link"><i class="fa-solid fa-gears"></i> System Settings</a>
        </div>

        <!-- Main Content Wrapper (Synced) -->
        <div class="main-content text-white">
            <!-- Premium Header (Synced) -->
            <div class="dashboard-header fade-up align-items-center mb-5">
                <div class="header-title">
                    <h4 class="fw-800 text-white text-uppercase ls-2">Register Assistant</h4>
                    <p class="text-secondary mb-0">Onboard support personnel to manage clinic operations</p>
                </div>
                <div class="header-actions">
                    <a href="staff.html" class="action-item glass-card rounded-pill text-decoration-none">
                        <i class="fa-solid fa-arrow-left text-cyan"></i>
                        <span>Exit Hub</span>
                    </a>
                    <div class="avatar shadow-sm">M</div>
                </div>
            </div>

            <!-- Assistant Registration Form -->
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="dash-card border-start border-info border-4 fade-up">
                        <h5 class="text-white fw-800 mb-4 d-flex align-items-center">
                            <i class="fa-solid fa-id-badge me-3 text-info"></i> Assistant Details
                        </h5>
                        <form id="astForm">
                            <div class="row g-4 mb-5">
                                <div class="col-md-6">
                                    <label class="smaller text-muted text-uppercase fw-800 mb-2 d-block">Assistant
                                        Name</label>
                                    <input type="text" id="astN" class="form-control custom-input py-3 px-4"
                                        placeholder="Sara Mohamed" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="smaller text-muted text-uppercase fw-800 mb-2 d-block">Assigned
                                        Floor/Dept</label>
                                    <select id="astD" class="form-select custom-input py-3 px-4">
                                        <option selected>Main Reception</option>
                                        <option>Emergency Wing</option>
                                        <option>Laboratory</option>
                                    </select>
                                </div>
                            </div>
                            <button type="submit"
                                class="btn border border-info text-info w-100 py-3 fw-800 rounded-3 dark-btn hover-bg-info">Register
                                Personnel</button>
                        </form>
                    </div>
                </div>
            </div>

            <div id="toast" class="toast-glow"></div>
        </div>
    </div>

    <script>
        function showGlow(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 2000); }
        document.getElementById('astForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Data logic could be expanded here
            showGlow('Assistant Registered Successfully!');
            e.target.reset();
        });
    </script>
</body>

</html>
