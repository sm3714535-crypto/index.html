<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MediCare Clinic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- AOS Animation CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
</head>
<body class="d-flex align-items-center min-vh-100">

    <div class="container d-flex flex-column justify-content-center align-items-center w-100" data-aos="fade-in" data-aos-duration="1000">
        
        <!-- Header Text -->
        <div class="text-center mb-4">
            <div class="login-icon-top mb-3">
                <i class="bi bi-activity"></i>
            </div>
            <h2 class="fw-bold text-white mb-1">Admin Access</h2>
            <p class="text-white-50 small">Sign in to access your administrative dashboard</p>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <form action="dashboard.html">
                <!-- Email Field -->
                <div class="mb-4">
                    <label class="form-label text-light small fw-medium">Email Address</label>
                    <div class="position-relative">
                        <i class="bi bi-envelope position-absolute top-50 translate-middle-y ms-3 custom-input-icon"></i>
                        <input type="email" class="form-control custom-input ps-5" placeholder="admin@medicare.com">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="mb-3">
                    <label class="form-label text-light small fw-medium">Password</label>
                    <div class="position-relative">
                        <i class="bi bi-lock position-absolute top-50 translate-middle-y ms-3 custom-input-icon"></i>
                        <input type="password" class="form-control custom-input ps-5" placeholder="••••••••">
                        <i class="bi bi-eye position-absolute top-50 translate-middle-y text-muted end-0 me-3 cursor-pointer hover-text-cyan custom-input-icon" role="button"></i>
                    </div>
                </div>

                <!-- Forgot Password -->
                <div class="d-flex justify-content-end mb-4">
                    <a href="#" class="text-cyan text-decoration-none small">Forgot Password?</a>
                </div>

                <!-- Sign In Button -->
                <button type="submit" class="btn btn-cyan w-100 mb-4 fw-bold">Sign In</button>

                <!-- Demo Accounts Box -->
                <div class="demo-box mb-4">
                    <p class="text-light mb-2 small fw-medium">Admin credentials:</p>
                    <ul class="list-unstyled text-white-50 small mb-0 details-list">
                        <li>• admin@medicare.com → Full System Access</li>
                    </ul>
                </div>

                <!-- Sign up Link -->
                <div class="text-center small text-white-50">
                    Don't have an account? <a href="#" class="text-cyan text-decoration-none">Sign Up</a>
                </div>
            </form>
        </div>

        <!-- Back to Home -->
        <div class="mt-4">
            <a href="../index.html" class="text-white-50 text-decoration-none small hover-text-cyan">
                <i class="bi bi-arrow-left me-1"></i> Back to Home
            </a>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AOS Animation JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Custom JS -->
    <script src="../script.js"></script>
</body>
</html>
