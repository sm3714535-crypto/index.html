<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Management - MediCare Clinic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="wrapper">
        <!-- Unified Sidebar (Synced with Dashboard) -->
                        <div class="sidebar">
            <div class="sidebar-brand d-flex align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-25">
                <div class="clinic-logo-box me-2"><i class="fa-solid fa-heart-pulse"></i></div>
                <div><h5 class="mb-0 text-white fw-bold">MediCare Clinic</h5><small class="text-white-50 opacity-75">Admin Panel</small></div>
            </div>
            <a href="../index.html" class="sidebar-link"><i class="fa-solid fa-desktop"></i> HOME</a>
            <a href="login.html" class="sidebar-link"><i class="fa-solid fa-right-to-bracket"></i> LOG IN</a>
            <div class="nav-title">ADMIN MENU</div>
            <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-pie"></i> Admin Dashboard</a>
            <a href="staff.html" class="sidebar-link"><i class="fa-solid fa-user-doctor"></i> Staff Management</a>
            <a href="serv_spec.html" class="sidebar-link"><i class="fa-solid fa-hand-holding-medical"></i> Services & Specialties</a>
            <a href="patient.html" class="sidebar-link"><i class="fa-solid fa-hospital-user"></i> Patients & Visits</a>
            <a href="financ.html" class="sidebar-link active"><i class="fa-solid fa-money-bill-trend-up"></i> Financial Management</a>
            <a href="system.html" class="sidebar-link"><i class="fa-solid fa-gears"></i> System Settings</a>
        </div>

        <!-- Main Content Wrapper (Synced) -->
        <div class="main-content text-white">
            <!-- Premium Header (Synced) -->
            <div class="dashboard-header fade-up align-items-center">
                <div class="header-title">
                    <h4 class="fw-800 text-white text-uppercase ls-2">Finance Hub</h4>
                    <p class="text-secondary mb-0">High-fidelity revenue & expense ledger</p>
                </div>
                <div class="header-actions">
                    <div class="action-item glass-card rounded-pill">
                        <i class="fa-solid fa-clock text-cyan"></i>
                        <span id="liveClock">00:00:00</span>
                    </div>
                    <div class="avatar shadow-sm">M</div>
                </div>
            </div>

            <!-- Dashboard Navigation Tiles -->
            <div class="finance-tiles-grid fade-up mt-5">
                <a href="finance_add.html" class="finance-tile">
                    <i class="fa-solid fa-square-plus"></i>
                    <span>Add Expense</span>
                </a>
                <a href="finance_list.html" class="finance-tile">
                    <i class="fa-solid fa-list-ul"></i>
                    <span>Expenses List</span>
                </a>
                <a href="finance_income.html" class="finance-tile">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <span>Income Report</span>
                </a>
                <a href="finance_exp_report.html" class="finance-tile">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Expenses Report</span>
                </a>
                <a href="finance_monthly.html" class="finance-tile">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Monthly Report</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Clock Engine (Synced with global dashboard behavior) -->
    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
