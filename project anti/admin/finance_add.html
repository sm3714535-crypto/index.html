<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Expense - MediCare Clinic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <div class="wrapper">
        <!-- Unified Sidebar (Synced) -->
                        <div class="sidebar">
            <div class="sidebar-brand d-flex align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-25">
                <div class="clinic-logo-box me-2"><i class="fa-solid fa-heart-pulse"></i></div>
                <div><h5 class="mb-0 text-white fw-bold">MediCare Clinic</h5><small class="text-white-50 opacity-75">Admin Panel</small></div>
            </div>
            <a href="../index.html" class="sidebar-link"><i class="fa-solid fa-desktop"></i> HOME</a>
            <a href="login.html" class="sidebar-link"><i class="fa-solid fa-right-to-bracket"></i> LOG IN</a>
            <div class="nav-title">ADMIN MENU</div>
            <a href="dashboard.html" class="sidebar-link"><i class="fa-solid fa-chart-pie"></i> Admin Dashboard</a>
            <a href="staff.html" class="sidebar-link"><i class="fa-solid fa-user-doctor"></i> Staff Management</a>
            <a href="serv_spec.html" class="sidebar-link"><i class="fa-solid fa-hand-holding-medical"></i> Services & Specialties</a>
            <a href="patient.html" class="sidebar-link"><i class="fa-solid fa-hospital-user"></i> Patients & Visits</a>
            <a href="financ.html" class="sidebar-link active"><i class="fa-solid fa-money-bill-trend-up"></i> Financial Management</a>
            <a href="system.html" class="sidebar-link"><i class="fa-solid fa-gears"></i> System Settings</a>
        </div>

        <!-- Main Content Wrapper (Synced) -->
        <div class="main-content text-white">
            <!-- Premium Header (Synced) -->
            <div class="dashboard-header fade-up align-items-center">
                <div class="header-title">
                    <h4 class="fw-800 text-white text-uppercase ls-2">ADD EXPENSE</h4>
                    <p class="text-secondary mb-0">Record a new clinic expenditure</p>
                </div>
                <div class="header-actions">
                    <a href="financ.html" class="action-item glass-card rounded-pill text-decoration-none">
                        <i class="fa-solid fa-arrow-left text-cyan"></i>
                        <span>Exit Hub</span>
                    </a>
                    <div class="avatar shadow-sm">M</div>
                </div>
            </div>

            <div class="row justify-content-center mt-5">
                <div class="col-lg-6">
                    <div class="dash-card bg-opacity-75 fade-up">
                        <form id="expForm">
                            <div class="mb-4">
                                <label class="smaller text-muted text-uppercase fw-800 mb-2 d-block">Title</label>
                                <input type="text" id="exT" class="form-control custom-input py-3 px-4" placeholder="Description of expense" required>
                            </div>
                            <div class="mb-4">
                                <label class="smaller text-muted text-uppercase fw-800 mb-2 d-block">Amount</label>
                                <input type="number" id="exA" class="form-control custom-input py-3 px-4" step="0.01" min="0" placeholder="0.00" required>
                            </div>
                            <div class="mb-4">
                                <label class="smaller text-muted text-uppercase fw-800 mb-2 d-block">Date</label>
                                <input type="date" id="exD" class="form-control custom-input py-3 px-4" required>
                            </div>
                            <div class="mb-4">
                                <label class="smaller text-muted text-uppercase fw-800 mb-2 d-block">Expense Type</label>
                                <select id="exY" class="form-select custom-input py-3 px-4" onchange="toggleSpec()">
                                    <option value="General">General</option>
                                    <option value="Specialty">Specialty</option>
                                </select>
                            </div>
                            <div class="mb-4 d-none" id="specBox">
                                <label class="smaller text-muted text-uppercase fw-800 mb-2 d-block">Specialty Name</label>
                                <input type="text" id="exS" class="form-control custom-input py-3 px-4" placeholder="e.g. Cardiology">
                            </div>
                            <button type="submit" class="btn-cyan w-100 py-3 mt-2 fw-800">SAVE RECORD</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div id="toast" class="toast-glow"></div>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('mc_adv_finance')) || { expenses: [], income: [] };
        function toggleSpec() { document.getElementById('specBox').classList.toggle('d-none', document.getElementById('exY').value !== 'Specialty'); }
        function showGlow(m) { const t=document.getElementById('toast'); t.innerText=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }

        document.getElementById('expForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const exp = {
                id: Date.now(),
                title: document.getElementById('exT').value,
                amount: parseFloat(document.getElementById('exA').value),
                date: document.getElementById('exD').value,
                type: document.getElementById('exY').value,
                specialty: document.getElementById('exY').value === 'Specialty' ? document.getElementById('exS').value : ''
            };
            state.expenses.push(exp);
            localStorage.setItem('mc_adv_finance', JSON.stringify(state));
            e.target.reset(); toggleSpec(); showGlow('Expense Tracked!');
        });
        document.getElementById('exD').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
